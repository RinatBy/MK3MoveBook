name: Deploy GitHub Pages from release

on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact release tag to deploy (for example v1.1.8)
        required: true
        type: string
      use_current_styles:
        description: Replace the release stylesheet with web/styles.css from main
        required: true
        default: false
        type: boolean
      use_current_index:
        description: Replace the release index with web/index.html from main
        required: true
        default: false
        type: boolean
      use_current_app:
        description: Replace the release app with web/app.js from main
        required: true
        default: false
        type: boolean
      use_current_lore:
        description: Replace the release lore with web/data/lore.js from main
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out site tooling
        uses: actions/checkout@v4

      - name: Resolve and download web release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "A release tag is required"
          }
          $version = $tag.TrimStart("v")
          $asset = "MK3MoveBook-web-$version.zip"
          New-Item -ItemType Directory -Path release -Force | Out-Null
          gh release download $tag --pattern $asset --dir release
          $archive = Join-Path release $asset
          if (-not (Test-Path -LiteralPath $archive)) {
            throw "Release asset not found: $asset"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath release/extracted
          $webRoot = Join-Path $PWD "release/extracted/web"
          if (-not (Test-Path -LiteralPath (Join-Path $webRoot "index.html"))) {
            throw "The release archive does not contain web/index.html"
          }
          "WEB_ROOT=$webRoot" >> $env:GITHUB_ENV

      - name: Apply current stylesheet
        if: github.event_name == 'workflow_dispatch' && inputs.use_current_styles
        shell: pwsh
        run: |
          $sourceStyles = Join-Path $PWD "web/styles.css"
          $targetStyles = Join-Path $env:WEB_ROOT "styles.css"
          if (-not (Test-Path -LiteralPath $sourceStyles)) {
            throw "Stylesheet not found: $sourceStyles"
          }
          if (-not (Test-Path -LiteralPath $targetStyles)) {
            throw "Release stylesheet not found: $targetStyles"
          }
          Copy-Item -LiteralPath $sourceStyles -Destination $targetStyles -Force

      - name: Apply current index
        if: github.event_name == 'workflow_dispatch' && inputs.use_current_index
        shell: pwsh
        run: |
          $sourceIndex = Join-Path $PWD "web/index.html"
          $targetIndex = Join-Path $env:WEB_ROOT "index.html"
          if (-not (Test-Path -LiteralPath $sourceIndex)) {
            throw "Index not found: $sourceIndex"
          }
          if (-not (Test-Path -LiteralPath $targetIndex)) {
            throw "Release index not found: $targetIndex"
          }
          Copy-Item -LiteralPath $sourceIndex -Destination $targetIndex -Force

      - name: Apply current app
        if: github.event_name == 'workflow_dispatch' && inputs.use_current_app
        shell: pwsh
        run: |
          $sourceApp = Join-Path $PWD "web/app.js"
          $targetApp = Join-Path $env:WEB_ROOT "app.js"
          if (-not (Test-Path -LiteralPath $sourceApp)) {
            throw "App script not found: $sourceApp"
          }
          if (-not (Test-Path -LiteralPath $targetApp)) {
            throw "Release app script not found: $targetApp"
          }
          Copy-Item -LiteralPath $sourceApp -Destination $targetApp -Force

      - name: Apply current lore
        if: github.event_name == 'workflow_dispatch' && inputs.use_current_lore
        shell: pwsh
        run: |
          $sourceLore = Join-Path $PWD "web/data/lore.js"
          $targetLore = Join-Path $env:WEB_ROOT "data/lore.js"
          if (-not (Test-Path -LiteralPath $sourceLore)) {
            throw "Lore data not found: $sourceLore"
          }
          if (-not (Test-Path -LiteralPath $targetLore)) {
            throw "Release lore data not found: $targetLore"
          }
          Copy-Item -LiteralPath $sourceLore -Destination $targetLore -Force

      - name: Generate static site
        shell: pwsh
        run: |
          ./tools/generate-site.ps1 `
            -WebRoot $env:WEB_ROOT `
            -OutputRoot .site-dist `
            -BaseUrl https://movebook.ru/ `
            -AssetVersion "${{ github.sha }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
